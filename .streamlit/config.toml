[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
maxUploadSize = 50

[logger]
level = "info"
messageFormat = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 50
timeZone = "UTC"
enableXsrfProtection = true
enableWebsocketCompression = true
